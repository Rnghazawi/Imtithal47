<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restricted Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 320px;
      text-align: center;
    }
    .lock-icon { font-size: 36px; margin-bottom: 1rem; }
    h2 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 0.4rem; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 12px;
      letter-spacing: 3px;
    }
    input[type="password"]:focus { border-color: #0078d4; }
    button#login-btn {
      width: 100%;
      padding: 11px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#login-btn:hover { background: #005a9e; }
    button#login-btn:disabled { background: #aaa; cursor: not-allowed; }
    #msg { font-size: 13px; margin-top: 12px; min-height: 18px; color: #e53935; }
    #attempts-bar { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
    .dot.used { background: #e53935; }
    #frame-wrap { display: none; position: fixed; inset: 0; background: white; z-index: 9999; }
    #dash-frame { width: 100%; height: 100%; border: none; }
    #logout-btn {
      position: fixed; top: 14px; right: 14px; z-index: 10000;
      background: rgba(0,0,0,0.55); color: white; border: none;
      border-radius: 8px; padding: 7px 16px; font-size: 13px;
      cursor: pointer; transition: background 0.2s;
    }
    #logout-btn:hover { background: rgba(0,0,0,0.75); }
  </style>
</head>
<body>

<div id="login-view">
  <div class="card">
    <div class="lock-icon">🔒</div>
    <h2>Dashboard Access</h2>
    <p class="subtitle">Enter password to continue</p>
    <input type="password" id="pass" placeholder="Password"
           onkeydown="if(event.key==='Enter') check()" autocomplete="off" />
    <button id="login-btn" onclick="check()">Access Dashboard</button>
    <p id="msg"></p>
    <div id="attempts-bar">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>
  </div>
</div>

<div id="frame-wrap">
  <button id="logout-btn" onclick="logout()">&#x2715; &nbsp;Logout</button>
  <iframe id="dash-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
  </iframe>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────

// رابط الداشبورد مشفّر بـ Base64
const ENCODED_URL =
  "aHR0cHM6Ly9hcHAucG93ZXJiaS5jb20vdmlldz9yPWV5SnJJam9pTlRJM05HSmxNVEF0TVdJd09DMDBOVGhtTFRrM1ltUXRaV1psWW1VM1lqTm1ZalJsSWl3aWRDSTZJak5rWm1JM01qazFMVEk1TkRBdE5EZzJZeTA0Tm1RMkxXUm1OMk5pTnpWbVpUaGtNeUlzSW1NaU9qbDkmcGFnZU5hbWU9OTE1ZmFmNmJlOTdkMzA3Y2QwNzk=";

// SHA-256 hash لكلمة المرور — الحالي = "123456"
// لتوليد hash لكلمة جديدة: افتح console وشغّل:
//   console.log(sha256("كلمتك_الجديدة"))
// بعد تحميل الصفحة
const CORRECT_HASH =
  "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 60000;

// ─────────────────────────────────────────────
//  SHA-256 — Pure JavaScript (no crypto.subtle)
//  يشتغل في كل بيئة بما فيها GitHub Pages
// ─────────────────────────────────────────────
function sha256(str) {
  function rr(v, a) { return (v >>> a) | (v << (32 - a)); }
  var mp = Math.pow, mw = mp(2,32), h = [], k = [], pc = 0, ic = {};
  for (var c = 2; pc < 64; c++) {
    if (!ic[c]) {
      for (var ii = 0; ii < 313; ii += c) ic[ii] = c;
      h[pc] = (mp(c,.5)*mw)|0;
      k[pc++] = (mp(c,1/3)*mw)|0;
    }
  }
  var oh = h.slice(0);
  str += '\x80';
  while (str.length % 64 - 56) str += '\x00';
  var w = [], abl = (str.length - 1) * 8;
  for (var i = 0; i < str.length; i++) {
    var j = str.charCodeAt(i);
    if (j >> 8) return '';
    w[i>>2] |= j << ((3-i)%4)*8;
  }
  w[w.length] = (abl/mw)|0;
  w[w.length] = abl;
  for (j = 0; j < w.length;) {
    var ww = w.slice(j, j += 16);
    var nh = h.slice(0);
    h = oh.slice(0);
    for (i = 0; i < 64; i++) {
      var i2 = i+j-16;
      var w15 = ww[i-15]||0, w2 = ww[i-2]||0;
      var a = h[0], e = h[4];
      var t1 = h[7]
        + (rr(e,6)^rr(e,11)^rr(e,25))
        + ((e&h[5])^(~e&h[6]))
        + k[i]
        + (ww[i] = i<16 ? ww[i]||0 : (
            ww[i-16]||0
            +(rr(w15,7)^rr(w15,18)^(w15>>>3))
            +(ww[i-7]||0)
            +(rr(w2,17)^rr(w2,19)^(w2>>>10))
          )|0);
      var t2 = (rr(a,2)^rr(a,13)^rr(a,22))
        +((a&h[1])^(a&h[2])^(h[1]&h[2]));
      h = [(t1+t2)|0].concat(h);
      h[4] = (h[4]+t1)|0;
      h.length = 8;
    }
    nh.forEach(function(v,i){ h[i]=(h[i]+v)|0; });
    oh = h.slice(0);
  }
  return h.reduce(function(hex,v){ return hex+(v+mw).toString(16).substr(1); },'');
}

// ─────────────────────────────────────────────
//  Logic
// ─────────────────────────────────────────────
var attempts = 0;
var lockedUntil = 0;

function check() {
  var now = Date.now();
  if (now < lockedUntil) {
    var secs = Math.ceil((lockedUntil - now) / 1000);
    setMsg("Too many attempts. Try again in " + secs + "s.");
    return;
  }
  var val = document.getElementById("pass").value.trim();
  if (!val) return;
  var h = sha256(val);
  document.getElementById("pass").value = "";
  if (h === CORRECT_HASH) {
    attempts = 0; updateDots();
    document.getElementById("login-view").style.display = "none";
    document.getElementById("frame-wrap").style.display = "block";
    document.getElementById("dash-frame").src = atob(ENCODED_URL);
  } else {
    attempts++; updateDots();
    if (attempts >= MAX_ATTEMPTS) {
      lockedUntil = Date.now() + LOCKOUT_MS;
      attempts = 0; updateDots();
      document.getElementById("login-btn").disabled = true;
      setMsg("Account locked for 60 seconds.");
      setTimeout(function() {
        document.getElementById("login-btn").disabled = false;
        setMsg(""); updateDots();
      }, LOCKOUT_MS);
    } else {
      var left = MAX_ATTEMPTS - attempts;
      setMsg("Incorrect password. " + left + " attempt" + (left !== 1 ? "s" : "") + " left.");
    }
  }
}

function logout() {
  document.getElementById("dash-frame").src = "about:blank";
  document.getElementById("frame-wrap").style.display = "none";
  document.getElementById("login-view").style.display = "flex";
  setMsg("");
}

function setMsg(t) { document.getElementById("msg").textContent = t; }

function updateDots() {
  for (var i = 1; i <= MAX_ATTEMPTS; i++) {
    var d = document.getElementById("d"+i);
    if (d) { d.classList[i<=attempts?"add":"remove"]("used"); }
  }
}
</script>
</body>
</html>
