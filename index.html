<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restricted Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 320px;
      text-align: center;
    }

    .lock-icon {
      font-size: 36px;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 12px;
      letter-spacing: 3px;
    }

    input[type="password"]:focus {
      border-color: #0078d4;
    }

    button#login-btn {
      width: 100%;
      padding: 11px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button#login-btn:hover { background: #005a9e; }
    button#login-btn:disabled { background: #aaa; cursor: not-allowed; }

    #msg {
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      color: #e53935;
    }

    #attempts-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s;
    }

    .dot.used { background: #e53935; }

    /* ===== IFRAME OVERLAY ===== */
    #frame-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: white;
      z-index: 9999;
    }

    #dash-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    #logout-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10000;
      background: rgba(0,0,0,0.55);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    #logout-btn:hover { background: rgba(0,0,0,0.75); }
  </style>
</head>
<body>

<!-- ===== LOGIN VIEW ===== -->
<div id="login-view">
  <div class="card">
    <div class="lock-icon">🔒</div>
    <h2>Dashboard Access</h2>
    <p class="subtitle">Enter password to continue</p>

    <input
      type="password"
      id="pass"
      placeholder="Password"
      onkeydown="if(event.key==='Enter') check()"
      autocomplete="off"
    />

    <button id="login-btn" onclick="check()">Access Dashboard</button>

    <p id="msg"></p>

    <div id="attempts-bar">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD VIEW ===== -->
<div id="frame-wrap">
  <button id="logout-btn" onclick="logout()">✕ &nbsp;Logout</button>
  <iframe
    id="dash-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
  ></iframe>
</div>

<script>
  // ─────────────────────────────────────────────
  //  CONFIG — عدّل هنا فقط
  // ─────────────────────────────────────────────

  // رابط الداشبورد مشفّر بـ Base64
  // لتغيير الرابط: افتح console وشغّل: btoa("الرابط_الجديد")
  const ENCODED_URL =
    "aHR0cHM6Ly9hcHAucG93ZXJiaS5jb20vdmlldz9yPWV5SnJJam9pTlRJM05HSmxNVEF0TVdJd09DMDBOVGhtTFRrM1ltUXRaV1psWW1VM1lqTm1ZalJsSWl3aWRDSTZJak5rWm1JM01qazFMVEk1TkRBdE5EZzJZeTA0Tm1RMkxXUm1OMk5pTnpWbVpUaGtNeUlzSW1NaU9qbDkmcGFnZU5hbWU9OTE1ZmFmNmJlOTdkMzA3Y2QwNzk=";

  // SHA-256 لكلمة المرور
  // الحالي = "123456" — لتغييرها: افتح console وشغّل:
  //   crypto.subtle.digest("SHA-256", new TextEncoder().encode("كلمتك"))
  //   .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("")))
  const CORRECT_HASH =
    "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

  const MAX_ATTEMPTS = 5;
  const LOCKOUT_MS   = 60 * 1000; // دقيقة واحدة

  // ─────────────────────────────────────────────

  let attempts = 0;
  let lockedUntil = 0;

  async function sha256(msg) {
    const buf = await crypto.subtle.digest(
      "SHA-256",
      new TextEncoder().encode(msg)
    );
    return [...new Uint8Array(buf)]
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  async function check() {
    const now = Date.now();

    // فحص القفل
    if (now < lockedUntil) {
      const secs = Math.ceil((lockedUntil - now) / 1000);
      setMsg(`Too many attempts. Try again in ${secs}s.`);
      return;
    }

    const val = document.getElementById("pass").value.trim();
    if (!val) return;

    const h = await sha256(val);
    document.getElementById("pass").value = "";

    if (h === CORRECT_HASH) {
      // ✅ دخول ناجح
      attempts = 0;
      updateDots();
      document.getElementById("login-view").style.display = "none";
      document.getElementById("frame-wrap").style.display = "block";
      // الرابط يُحلّ هنا فقط — بعد التحقق
      document.getElementById("dash-frame").src = atob(ENCODED_URL);
    } else {
      // ❌ كلمة خاطئة
      attempts++;
      updateDots();

      if (attempts >= MAX_ATTEMPTS) {
        lockedUntil = Date.now() + LOCKOUT_MS;
        attempts = 0;
        updateDots();
        document.getElementById("login-btn").disabled = true;
        setMsg("Account locked for 60 seconds.");
        setTimeout(() => {
          document.getElementById("login-btn").disabled = false;
          setMsg("");
          updateDots();
        }, LOCKOUT_MS);
      } else {
        setMsg(`Incorrect password. ${MAX_ATTEMPTS - attempts} attempt${MAX_ATTEMPTS - attempts !== 1 ? "s" : ""} left.`);
      }
    }
  }

  function logout() {
    // امسح الـ iframe أولاً
    document.getElementById("dash-frame").src = "about:blank";
    document.getElementById("frame-wrap").style.display = "none";
    document.getElementById("login-view").style.display = "flex";
    setMsg("");
  }

  function setMsg(text) {
    document.getElementById("msg").textContent = text;
  }

  function updateDots() {
    for (let i = 1; i <= MAX_ATTEMPTS; i++) {
      const dot = document.getElementById("d" + i);
      if (dot) dot.classList.toggle("used", i <= attempts);
    }
  }
</script>

</body>
</html>
